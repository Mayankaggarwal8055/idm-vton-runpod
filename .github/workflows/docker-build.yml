name: Build and Push IDM-VTON RunPod Image

on:
  push:
    branches:
      - main
    paths:
      - "**"
      - "!*.md"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: mayankaggarwal8055/idm-vton-runpod:v30
          build-args: GIT_REVISION=${{ github.sha }}
          cache-from: |
            type=gha
            type=registry,ref=mayankaggarwal8055/idm-vton-runpod:cache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=mayankaggarwal8055/idm-vton-runpod:cache,mode=max
          provenance: false